<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Sem conexão · Sublimação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc; color: #0f172a;
        display: grid; place-items: center; padding: 1.5rem;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border-color: #334155; }
        .muted { color: #94a3b8; }
        .btn-secondary { background: #1e293b; color: #f1f5f9; border-color: #334155; }
      }
      .card {
        max-width: 26rem; width: 100%;
        background: #fff; border: 1px solid #e2e8f0;
        border-radius: 16px; padding: 2rem 1.5rem; text-align: center;
        box-shadow: 0 10px 30px -12px rgba(0,0,0,.15);
      }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 1rem;
        border-radius: 14px; background: #2563eb;
        display: grid; place-items: center; color: #fff;
        font-size: 28px; font-weight: 700;
      }
      h1 { font-size: 1.15rem; margin: 0 0 .5rem; }
      .muted { color: #475569; margin: 0 0 1.5rem; }
      .actions { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; }
      .btn { padding: .6rem 1.1rem; border-radius: 10px; font: inherit; font-weight: 500;
        cursor: pointer; border: 1px solid transparent; text-decoration: none; }
      .btn-primary { background: #2563eb; color: #fff; }
      .btn-secondary { background: #fff; color: #0f172a; border-color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">S</div>
      <h1>Sem conexão</h1>
      <p class="muted">Você está offline no momento. Verifique sua internet e tente novamente — o sistema voltará assim que a conexão for restabelecida.</p>
      <div class="actions">
        <button class="btn btn-primary" onclick="location.reload()">Tentar novamente</button>
        <a class="btn btn-secondary" href="/">Início</a>
      </div>
    </main>
    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
